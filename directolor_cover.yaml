# buttons.yaml - Simple package for two configurable buttons

external_components:
  source: github://loucks1/Directolor-ESPHome@IssueWithFavoriteAndProgram
  refresh: 1s

substitutions:
  nrf24_ce_pin: 22
  nrf24_cs_pin: 21
  id: directolor_shade
  name: Directolor Shade
  movement_duration: 0s
  channel: 1
  tilt_supported: false
  favorite_support: false
  program_support: false
  radio_code:
      - 0x06
      - 0x03
      - 0x05
      - 0x12
      
nrf24l01_base:
  id: nrf24l01
  ce_pin: ${nrf24_ce_pin}
  cs_pin: ${nrf24_cs_pin}
  
cover:
  - platform: directolor_cover
    base: nrf24l01
    id: ${id}
    name: ${name}
    radio_code: ${radio_code}
    movement_duration: ${movement_duration}
    channel: ${channel}
    tilt_supported: ${tilt_supported}

button:
  - platform: template
    id: "${id}_to_favorite"
    name: "${name} to favorite"
    disabled_by_default: ${favorite_support}
    on_press:
      then:
        - lambda: id(${id})->issue_shade_command(directolor_toFav, DIRECTOLOR_CODE_ATTEMPTS);
  - platform: template
    id: "${id}_test_close"
    name: "${name} test close"
    on_press:
      then:
        - lambda: id(${id})->issue_shade_command(directolor_close, DIRECTOLOR_CODE_ATTEMPTS);

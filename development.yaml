esphome:
  name: development
  friendly_name: development

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: "3.1"
      sram1_as_iram: true


logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:
  port: 80

ota:
  platform: esphome

spi:
  - id: nrf24_spi
    clk_pin: GPIO18
    mosi_pin: GPIO23
    miso_pin: GPIO19
    interface: hardware

# ====================== nRF24 RADIO ======================
nrf24:
  - id: my_nrf24
    spi_id: nrf24_spi
    cs_pin: GPIO21
    ce_pin: GPIO22
    channel: 53
    data_rate: 2MHz

external_components:
  - source:
      type: local
      path: ./components
    components: [ nrf24, directolor_cover ]

packages:
  entry_blinds: !include
    file: ./directolor_cover.yaml
    vars:
      id: entry_blinds
      name: "Entry Blinds"
      nrf24_id: my_nrf_radio   
      radio_code: [0x12, 0xF0, 0x78, 0x09]
      tilt_supported: true
      channel: 1
      movement_duration: 0s
      disable_favorite_support: true
      disable_program_support: true

  upper_shades_left: !include
    file: ./directolor_cover.yaml
    vars:
      id: upper_shades_left
      name: "Upper Shades Left"
      nrf24_id: my_nrf_radio   
      radio_code: [0x11, 0x11, 0xB9, 0x7B]
      tilt_supported: true
      channel: 1
      movement_duration: 16s
      disable_favorite_support: true
      disable_program_support: true

button:
  - platform: restart
    name: "ESP Reboot"
    icon: mdi:power-cycle
esphome:
  name: development
  friendly_name: development

substitutions:
  enable_directolor_remote_search: true

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: "3.1"
      sram1_as_iram: true

api:

logger:
  level: DEBUG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

web_server:
  port: 80

ota:
  platform: esphome

spi:
  - id: nrf24_spi
    clk_pin: GPIO18
    mosi_pin: GPIO23
    miso_pin: GPIO19
    interface: hardware

# ====================== nRF24 RADIO ======================
nrf24:
  id: my_nrf24
  spi_id: nrf24_spi
  cs_pin: GPIO21
  ce_pin: GPIO22
  channel: 53
  data_rate: 2MHz

directolor_radio:
  id: my_radio_hub
  nrf24_id: my_nrf24    
  directolor_code_attempts: 3
  message_send_repeats: 513

packages:

  test_shade: !include
    file: ./local_directolor_cover.yaml
    vars:
      id: test_shade
      name: "Test Shade"
      radio_hub_id: my_radio_hub   
      radio_code: [0x06, 0x04, 0x05, 0x12]
      tilt_supported: true
      channel: 1
      movement_duration: 10s
      disable_favorite_support: true
      disable_program_support: true

button:
  - platform: restart
    name: "ESP Reboot"
    icon: mdi:power-cycle